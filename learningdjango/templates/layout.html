{% load static %}

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>
    {% block title %}
      learning Django
    {% endblock title %}
  </title>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">

    <!-- Left side content (Brand optional) -->
    <a class="navbar-brand" href="#">TweetBar</a>

    <!-- Right side buttons -->
    <div class="ms-auto d-flex align-items-center">

      <a href="{% url 'tweet_list' %}" class="btn btn-primary mx-2">Tweet Home</a>

      {% if user.is_authenticated %}
      <form method="post" action="{% url 'logout' %}">
  {% csrf_token %}
  <button class="btn btn-danger" type="submit">Logout</button>
</form>

      {% else %}
      <a href="{% url 'register' %}" class="btn btn-primary mx-2">Register</a>
      <a href="{% url 'login' %}" class="btn btn-success mx-2">Login</a>
      {% endif %}
    </div>

  </div>
</nav>

{% block content %}
{% endblock %}
</body>

</html>
