{% extends "layout.html" %}

{% block title %}
    Django app
{% endblock %}

{% block content %}
    <h2> {% if from.instance.pk %}
        Edit Tweet
    {% else %}
        Create Tweet
    {% endif %}
    <form method="post" enctype="multipart/form-data"
    class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-warning" type="submit">Submit</
    button>
    </form>
    <a href="{% url 'tweet_list' %}">Back to tweet list</a>
            
    </h2>
{% endblock %}s
